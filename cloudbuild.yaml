steps:
  # ── 1. Build & push the unified image (frontend + API) ────────
  - name: "gcr.io/cloud-builders/docker"
    args:
      - build
      - -t
      - "${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPOSITORY}/${_SERVICE_NAME}:latest"
      - -f
      - web/Dockerfile.prod
      - .
    id: build-web

  - name: "gcr.io/cloud-builders/docker"
    args:
      - push
      - "${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPOSITORY}/${_SERVICE_NAME}:latest"
    id: push-web
    waitFor: [build-web]

  # ── 2. Deploy to Cloud Run ─────────────────────────────────────
  - name: "gcr.io/cloud-builders/gcloud"
    args:
      - run
      - deploy
      - ${_SERVICE_NAME}
      - --image
      - "${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPOSITORY}/${_SERVICE_NAME}:latest"
      - --region
      - ${_REGION}
      - --allow-unauthenticated
      - --min-instances=0
      - --max-instances=1
      - --concurrency=80
    id: deploy-web
    waitFor: [push-web]

images:
  - "${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPOSITORY}/${_SERVICE_NAME}:latest"

options:
  logging: CLOUD_LOGGING_ONLY
